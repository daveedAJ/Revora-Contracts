name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:
    inputs:
      toolchain:
        description: "Rust toolchain version"
        required: true
        default: "1.79.0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  toolchain: 1.79.0

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.79.0
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml', '**/src/**') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Pin dependencies
        run: |
          cargo generate-lockfile
          cargo update -p base64ct --precise 1.6.0 || true
          cargo update -p derive_arbitrary --precise 1.3.2 || true

      - name: Check formatting
        run: cargo fmt --all -- --check || (cargo fmt --all && echo "FORMAT_FIXED=true" >> $GITHUB_ENV)

      - name: Commit formatting changes
        if: env.FORMAT_FIXED == 'true' && github.event_name != 'pull_request'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-format code"
          file_pattern: "src/*.rs"

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test -- --test-threads=1
        env:
          RUST_BACKTRACE: full
